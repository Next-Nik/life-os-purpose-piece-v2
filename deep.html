<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life OS: Purpose Piece — Deep Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <img src="/logo.png" alt="Life OS: Purpose Piece" class="logo" />
      <h1>Life OS: Purpose Piece</h1>
      <p>The deep experience</p>
    </header>

    <!-- Progress bar -->
    <div class="progress-container" id="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 20%"></div>
      </div>
      <div class="progress-label" id="progress-label">Deep Conversation</div>
    </div>

    <!-- Chat area -->
    <div id="chat-area" style="flex-direction:column; flex:1; display:flex;">
      <div id="chat-container"></div>
    </div>

  </div>

  <!-- Fixed input area -->
  <div class="input-area" id="input-area" style="display:none;">
    <div class="input-inner">
      <textarea
        id="user-input"
        placeholder="Respond here..."
        rows="1"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button class="btn-send" id="send-btn">Send</button>
    </div>
  </div>

  <script src="/ui.js"></script>
  <script src="/app-deep.js"></script>

</body>
</html>
